# 🌊 WkWave Live Daemon
name: "🌊 WkWave Live Daemon"

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 min, ALL days incl weekends (365/24 feed-daemon relay; newest-wins overlap handoff via _active_run_id)
  workflow_dispatch:

permissions:
  contents: read

# concurrency guard for stale heartbeat self-chain
concurrency:
  group: maejip-relay
  cancel-in-progress: false

env:
  GH_TOKEN:            ${{ secrets.GH_PAT }}
  HANTOO_APPKEY_KR:    ${{ secrets.HANTOO_APPKEY_KR }}
  HANTOO_APPSECRET_KR: ${{ secrets.HANTOO_APPSECRET_KR }}
  HANTOO_ACCOUNTNO_KR: ${{ secrets.HANTOO_ACCOUNTNO_KR }}
  SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL:       ${{ secrets.SLACK_CHANNEL }}
  PYTHONUTF8:          "1"
  PYTHONPATH:          "${{ github.workspace }}/wkaq/scripts"
  MAEJIP_RELAY_MODE:   "1"

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 32  # > the 20min relay cron so the old run survives to OVERLAP the new one and hand off cleanly ([>] via _active_run_id) instead of being CANCELLED at the timeout; > the 30min daemon relay-budget so [relay-exit] fires before GHA cancels

    steps:
      - name: setup-python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: clone
        run: |
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/kiexpert/WkAutoQuant.git" \
            wkaq

      - name: install
        run: pip install -q -r wkaq/requirements.txt

      - name: restore token
        run: |
          mkdir -p ~/.wk-cache/hantoo
          [ -f wkaq/wavevault/hantoo_cache/hantoo_token_kr.json ] && \
            cp wkaq/wavevault/hantoo_cache/hantoo_token_kr.json ~/.wk-cache/hantoo/ || true

      - name: run
        run: |
          HOUR=$(date -u +%H | sed 's/^0//')
          if   [ "$HOUR" -ge 0 ] && [ "$HOUR" -le 7 ];  then MARKET=KR
          elif [ "$HOUR" -ge 8 ] && [ "$HOUR" -le 21 ]; then MARKET=US
          else echo '.'; exit 0; fi
          cd wkaq
          python scripts/wkwave_daemon.py --market "$MARKET" --run-id "$GITHUB_RUN_ID"

      - name: Self-trigger on error (Recurrence Prevention)
        if: failure()
        run: |
          echo "Daemon exited with an error. Executing auto-heal self-trigger..."
          gh workflow run maejip_relay.yml --repo kiexpert/WkFeedQuant

      - name: Conditional self-chain on stale heartbeat
        if: always()
        run: |
          set -euo pipefail
          curl -fsSL \
            https://raw.githubusercontent.com/kiexpert/WkAutoQuant/main/wavevault/daemon_health.json \
            -o daemon_health.json || {
              echo "::warning::daemon_health.json unavailable"
              exit 0
            }
          AGE=$(python - <<'PY'
          import datetime as dt
          import json

          with open("daemon_health.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          last_success = data.get("last_success") or data.get("last_run")
          if not last_success:
              print(999999)
              raise SystemExit
          ts = dt.datetime.fromisoformat(last_success.replace("Z", "+00:00"))
          if ts.tzinfo is None:
              ts = ts.replace(tzinfo=dt.timezone.utc)
          now = dt.datetime.now(dt.timezone.utc)
          print(int((now - ts.astimezone(dt.timezone.utc)).total_seconds()))
          PY
          )
          echo "heartbeat age=${AGE}s"
          if [ "$AGE" -gt 900 ]; then
            sleep 600
            gh workflow run maejip_relay.yml --repo kiexpert/WkFeedQuant
          else
            echo "heartbeat fresh; skip self-chain"
          fi
